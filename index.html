<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firebase Auth - Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="auth-container">
    <h2>Log In</h2>
    <input type="email" id="email" placeholder="Email" required>
 <!-- পাসওয়ার্ড ফিল্ডের চারপাশে এই কন্টেইনারটি দিন -->
<div class="password-wrapper">
    <input type="password" id="password" placeholder="Password" required>
    <span id="togglePassword" class="password-toggle">👁️</span>
</div>
    <button id="btnLogin">Log In</button>
    
    <!-- সাইন-আপ পেজে যাওয়ার হাইপারলিঙ্ক -->
    <p class="auth-link">অ্যাকাউন্ট নেই? <a href="signup.html">সাইনআপ করুন</a></p>
</div>

<script type="module" src="login.js"></script>

</body>
</html>
